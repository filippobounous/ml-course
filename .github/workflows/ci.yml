name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  # Fast gate: base install, runs on every push / PR. Must stay green.
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff format . --check
          ruff check .

      - name: Type check (mypy)
        run: |
          mypy src

      - name: Tests (pytest)
        run: |
          pytest

  # Slow integration gate: installs the DL + ops extras and runs the
  # `@pytest.mark.slow` tier. Exercises torch-gated shape checks and the
  # example W5 micrograd-on-two-moons integration. Kept CPU-only (no GPU
  # runner on the free tier).
  test-dl:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies (base + dl + ops)
        run: |
          python -m pip install -U pip
          # Install CPU wheels to keep the job small and fast.
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.3" "torchvision>=0.18" "torchaudio>=2.3"
          python -m pip install -e ".[dev,ops]"

      - name: Tests (pytest + --run-slow)
        run: |
          pytest --run-slow -q
