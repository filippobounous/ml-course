# Default Trainer config — used as a Hydra group default. Per-week configs
# under this directory pull it in via:
#
#   defaults:
#     - trainer: default
#
# and override fields with `trainer.lr=3e-4 trainer.max_epochs=20` from the
# command line.
_target_: mlcourse.trainer.TrainerConfig
max_epochs: 10
lr: 0.001
device: auto
seed: 0
deterministic: true
grad_accum_steps: 1
grad_clip_norm: null
mixed_precision: false
log_every_n_steps: 50
checkpoint_dir: null
extras: {}
